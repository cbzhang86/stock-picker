# ============================================================
# A股智能选股系统 — 核心配置
# ============================================================

# ---- 数据源 ----
data_sources:
  primary: akshare           # 主数据源（已装 v1.18.39）
  fallback: baostock         # 备用数据源
  tencent_api: true          # 腾讯行情API（备用，不封IP）

  # 数据源优先级回退链
  priority_chains:
    realtime_quote:          # 实时行情
      - tencent
      - null
    kline:                   # 历史K线
      - baostock
      - mootdx
      - null
    capital_flow:            # 主力资金流
      - akshare
      - push2_direct         # 直连东财push2 API
      - null
    north_flow:              # 北向资金
      - akshare
      - null

# ---- 短线策略权重 ----
# 权重起点：A 股量化研报中位数对齐（资金流+动量共50%，题材弱化15%）
# 设计原则：每阶段迭代
#   阶段1（现在）：研报中位为起点（避免 optimizer 陷入局部最优）
#   阶段2（>=30条预测后）：feedback/optimizer.py 自动 Ridge 校准
#   阶段3（B5c 完成后）：IC × IR 反比加权，长短融合三段式
short_term:
  weights:
    capital_flow: 0.25         # 主力资金流（近10日累计流入）
    north_flow: 0.10           # 北向资金（短期信号权重上调，熔断自动降权50）
    momentum: 0.25             # 动量/RPS排位（A 股最强 cross-sectional 因子）
    technical: 0.15            # 技术形态（均线/MACD）
    volume_price: 0.10         # 量价配合
    hot_theme: 0.10            # 同花顺热点/题材归因（研报中位下调到 10%，原本 15% 让予 north_flow）
    dragon_tiger: 0.05         # 龙虎榜信号（叠加于 capital_flow 表达游资动量维度）
    # 合计 1.00。设计原理：
    # - 资金流 + 龙虎榜 总计 0.30，表达"游资动量"复合维度
    # - momentum 0.25 是 A 股学术公认的 cross-sectional alpha 源
    # - 技术 + 量价 = 0.25 提供系统化择时确认
    # - hot_theme + north_flow 各 0.10，反映"题材 + 境外聪明钱"的辅助信号
    # risk 不在权重表（语义不属于评分分项，而是过滤/惩罚）。
    # 风控通过 risk_filter 前置拦截（ST/涨停封死/解禁压力等），
    # 剩余软风险由 scoring_model 的 penalty 路径在总分上额外扣减。

  # 游资本组总权重：capital_flow + hot_theme + dragon_tiger = 0.43（2026-06-16 调整）
  # 游资线作为短线核心驱动力；north_flow 海外接口不稳降至 0.05 防止集体降权

  # 买入条件
  buy:
    max_candidates: 3         # 最多推荐数量
    min_score: 60             # 最低评分（0-100），低于此值跳过
    exclude_st: true
    exclude_limit_up: true    # 涨停封死的股票
    min_volume: 30000000      # 最低日成交额（3000万）
    min_listing_days: 60      # 最低上市天数

  # 卖出规则
  sell:
    take_profit: 0.02         # 止盈 +2%
    stop_loss: -0.02          # 止损 -2%
    time_stop_days: 3         # 时间止损（T+3）

# ---- 长线策略权重 ----
# 权重起点：A 股量化研报中位数对齐（基础财务+估值共50%，中期动量+北向共35%）
long_term:
  weights:
    fundamental: 0.30         # 基本面（ROE+净利率+负债率）
    north_flow: 0.20          # 北向资金（长线权重显著上调，月度 IC 约 0.05-0.08）
    momentum: 0.15            # 中期动量（60/120日RPS，与短线动量切开）
    valuation: 0.20           # 估值水位（PB+PS+股息率，分位指标，不含 PE）
    institutional: 0.15       # 机构动向（龙虎榜机构+大股东增减持）
    # 合计 1.00。设计原理：
    # - fundamental + valuation = 0.50 基础财务面
    # - momentum + north_flow = 0.35 中期趋势 + 境外聪明钱
    # - institutional = 0.15 机构动向

  hold_period:
    min_months: 3
    max_months: 6

  # 买入条件
  buy:
    max_candidates: 5         # 最多推荐数量
    min_score: 65             # 最低评分（0-100），低于此值跳过

# ---- 模型迭代 ----
model:
  version_dir: data/model_weights
  min_records_for_optimize: 30   # 至少积累30条推荐记录才触发优化
  optimizer: ridge               # 优化算法：ridge / lasso / linear
  ridge_alpha: 1.0
  auto_rollback_threshold: -0.05 # 新版胜率下降超5%则自动回滚

# ---- 回测 ----
backtest:
  default_start: "2024-01-01"
  default_end: "2025-12-31"
  initial_capital: 1000000       # 初始资金
  commission_rate: 0.0003         # 手续费万三
  slippage: 0.001                 # 滑点 0.1%
  parallel_workers: 4             # 数据拉取并行数

# ---- 推送 ----
notifications:
  console: true                  # 控制台输出
  # 以下后续配置：
  # feishu_webhook: ""
  # wechat_bot: ""
